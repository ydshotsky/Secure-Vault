spring:
  application:
    name: SecureVault
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
  threads:
    virtual:
      enabled: true
  data:
    redis:
      url: ${REDIS_URL}
      ssl:
        enabled: true

server:
  servlet:
    session:
      timeout: 20m
      # Force the session cookie to be marked 'Secure' (Required for HTTPS browsers)
      cookie:
        secure: true
        # Use 'Lax' so the cookie is sent during the form post
        same-site: lax

  # Tell Spring to trust the 'X-Forwarded-Proto' header from your host (e.g., Render/AWS)
  forward-headers-strategy: framework
  error:
    include-message: always
    include-binding-errors: always
management:
  endpoints:
    web:
      exposure:
        include: health,info
  metrics:
    enable:
        all: true
  tracing:
    sampling:
      probability: 1.0