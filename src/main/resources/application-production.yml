spring:
  application:
    name: SecureVault
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
  threads:
    virtual:
      enabled: true
  data:
    redis:
      url: ${REDIS_URL}
      ssl:
        enabled: true
      connect-timeout: 2000
      timeout: 500
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 1000
    jdbc:
      dialect: postgresql
logging:
  level:
    root: INFO
    # 1. Database Logging (SQL and Parameters)
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    # 2. Web/HTTP Request Logging
    org.springframework.web: DEBUG
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG
    # 3. Security/Auth Debugging (if needed)
    org.springframework.security: DEBUG

server:
  servlet:
    session:
      timeout: 20m
      # Force the session cookie to be marked 'Secure' (Required for HTTPS browsers)
      cookie:
        secure: true
        # Use 'Lax' so the cookie is sent during the form post
        same-site: lax

  # Tell Spring to trust the 'X-Forwarded-Proto' header from your host (e.g., Render/AWS)
  forward-headers-strategy: framework
  error:
    include-message: always
    include-binding-errors: always
management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    enable:
        all: true
  tracing:
    sampling:
      probability: 1.0
    enabled: false
  otlp:
#    tracing:
#      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}/v1/traces
#      headers:
#        Authorization: ${OTEL_EXPORTER_OTLP_HEADERS}
    metrics:
      export:
        url: "${OTEL_EXPORTER_OTLP_ENDPOINT}/v1/metrics"
        headers:
#            # This maps the Azure Env Var to the internal Spring config
          Authorization: "${OTEL_EXPORTER_OTLP_HEADERS_APP}"
        step: 1m
        enabled: true

