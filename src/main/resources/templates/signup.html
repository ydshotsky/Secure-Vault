<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Signup</title>
    <link rel="stylesheet" th:href="@{/css/signup.css}"/>
</head>
<body>
<div class="container">
    <h1>Sign Up</h1>
    <span id="username-status"></span>
    <form method="post" th:action="@{/signup}" th:object="${user}">
        <div>
            <label for="username">Username</label>
            <input id="username" name="username" required type="text" autocomplete="off"/>
        </div>
        <div>
            <label for="password">Password</label>
            <input id="password" name="password" required type="password"/>
        </div>
        <button id="submit-btn" type="submit">Sign Up</button>
    </form>

    <p>Already have an account? <a th:href="@{/login}">Login here</a></p>
</div>
<script th:src="@{/js/signup.js}" type="text/javascript"></script>
</body>
</html>
